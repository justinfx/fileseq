[mypy]
no_implicit_reexport=true
strict=true
files=src/fileseq
exclude=^(test/|env/|docs/|src/fileseq/grammar/generate\.py)
python_version=3.9
# Disable errors caused by ANTLR runtime lacking type stubs
disable_error_code=no-any-return,no-untyped-call,misc,unused-ignore

[mypy-antlr4.*]
ignore_missing_imports=true

[mypy-fileseq._vendor.antlr4.*]
ignore_missing_imports=true
ignore_errors=true

# Ignore generated ANTLR parser files (they have no type annotations)
[mypy-fileseq.parser.fileseqParser]
ignore_errors=true

[mypy-fileseq.parser.fileseqLexer]
ignore_errors=true

[mypy-fileseq.parser.fileseqVisitor]
ignore_errors=true

[mypy-fileseq.parser.fileseqListener]
ignore_errors=true
